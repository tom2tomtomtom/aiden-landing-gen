      - heading "How to Write a Better Creative Brief" [level=1] [ref=e14]
      - paragraph [ref=e15]: A vague brief produces vague creative. The best briefs are not documents — they are decisions. This guide covers everything you need to write briefs that actually inspire great work.
      - generic [ref=e16]:
        - generic [ref=e17]: 15 min read

          - heading "3. Common Brief Mistakes (and How to Fix Them)" [level=2] [ref=e81]
          - paragraph [ref=e82]: Most brief problems are predictable. Here are the most common mistakes — and what good looks like instead.
          - generic [ref=e83]:
            - 'heading "Mistake 1: The kitchen-sink brief" [level=3] [ref=e84]'
            - paragraph [ref=e85]: Trying to say everything at once. The brief becomes a strategy document, a project plan, and a brand bible all in one. Creatives cannot find the signal in the noise.
            - generic [ref=e86]:
              - generic [ref=e87]:
                - paragraph [ref=e88]: Bad
                - paragraph [ref=e89]: “We want to drive brand awareness, increase consideration, grow social following, support our retail partners, and also communicate our new product range launch while staying true to our 10-year heritage.”
              - generic [ref=e90]:
                - paragraph [ref=e91]: Good
                - paragraph [ref=e92]: “Make 25–35 year olds in London consider us for their first home insurance. That's the job. Everything else is secondary.”
          - generic [ref=e93]:
            - 'heading "Mistake 2: Describing the execution, not the problem" [level=3] [ref=e94]'
            - paragraph [ref=e95]: Telling creatives what to make instead of what to solve. This removes creative thinking from the process entirely, and usually produces mediocre work.
            - generic [ref=e96]:
              - generic [ref=e97]:
                - paragraph [ref=e98]: Bad
                - paragraph [ref=e99]: “We want a 30-second TV ad showing a family enjoying our product at home, with upbeat background music and a clear product shot at the end.”
              - generic [ref=e100]:
                - paragraph [ref=e101]: Good
                - paragraph [ref=e102]: “Families underestimate how much this product would change their evenings. Solve that. Medium is flexible — TV, digital, experiential — whatever gets there best.”
          - generic [ref=e103]:
            - 'heading "Mistake 3: Audience by demographics only" [level=3] [ref=e104]'
            - paragraph [ref=e105]: Defining the audience by age and gender tells the creative team almost nothing about how to connect with them.
            - generic [ref=e106]:
              - generic [ref=e107]:
                - paragraph [ref=e108]: Bad
                - paragraph [ref=e109]: "“Target audience: Men and women aged 30–50, ABC1, homeowners.”"
              - generic [ref=e110]:
                - paragraph [ref=e111]: Good
                - paragraph [ref=e112]: “People who care deeply about their home but feel guilty spending money on it for themselves. They'd justify it easily as a gift — but not for themselves.”
          - generic [ref=e113]:
            - 'heading "Mistake 4: No single-minded proposition" [level=3] [ref=e114]'
            - paragraph [ref=e115]: The proposition — the one thing you want someone to think, feel, or believe after seeing the work — is missing or buried in a list of messages. Without it, creative teams cannot make decisions.
            - generic [ref=e116]:
              - generic [ref=e117]:
                - paragraph [ref=e118]: Bad
                - paragraph [ref=e119]: "“Key messages: quality, value, heritage, innovation, sustainability, and great customer service.”"
              - generic [ref=e120]:
                - paragraph [ref=e121]: Good
                - paragraph [ref=e122]: "“Proposition: The only energy drink that doesn't make you feel like you sold out.”"
          - generic [ref=e123]:
            - 'heading "Mistake 5: Mandatories buried or missing" [level=3] [ref=e124]'
            - paragraph [ref=e125]: Logo placement rules, legal disclaimers, product shots, and brand lockups that must appear are often omitted from the brief, then surface at review — causing expensive revisions.
            - generic [ref=e126]:
              - generic [ref=e127]:
                - paragraph [ref=e128]: Bad
                - paragraph [ref=e129]: “Please follow brand guidelines.” (No guidelines attached. No detail provided.)
              - generic [ref=e130]:
                - paragraph [ref=e131]: Good
                - paragraph [ref=e132]: "“Mandatories: brand logo bottom-right, legal line below it, product must appear in last 5 seconds, no competitor references, no health claims without legal sign-off. Brand guide attached.”"

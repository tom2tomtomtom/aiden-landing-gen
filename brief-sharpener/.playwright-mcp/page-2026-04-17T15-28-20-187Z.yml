        - generic [ref=e40]:
          - heading "2. The 8 Essential Elements Every Brief Needs" [level=2] [ref=e41]
          - paragraph [ref=e42]: Strip back any great brief and you will find these eight elements. Some briefs call them different things, but the underlying information is always the same. Miss any one of them and you create ambiguity that costs time, money, and goodwill.
          - generic [ref=e43]:
            - heading "1. Objective" [level=3] [ref=e44]
            - paragraph [ref=e45]: What does this work need to achieve? Be specific about the business outcome, not just the deliverable. “We want a TV spot” is a deliverable. “We want to shift 18–34 brand consideration by 8 points over the next quarter” is an objective.
            - paragraph [ref=e46]: "Tip: A brief can have only one primary objective. If you have three, you actually have three briefs."
          - generic [ref=e47]:
            - heading "2. Audience" [level=3] [ref=e48]
            - paragraph [ref=e49]: Who is this for? Go beyond demographics. The most useful audience descriptions capture mindset, motivation, and tension. “Women 25–45” tells a creative nothing. “New mothers who feel judged for going back to work but also guilt-ridden for wanting to” gives them something to work with.
            - paragraph [ref=e50]: "Tip: Describe the audience at the moment they will encounter the work — what are they thinking, feeling, or doing right then?"
          - generic [ref=e51]:
            - heading "3. Deliverables" [level=3] [ref=e52]
            - paragraph [ref=e53]: "What are you actually making? List every asset with its specs: format, dimensions, duration, language versions, quantities. Vague deliverables lead to scope creep and missed expectations on both sides."
            - paragraph [ref=e54]: "Tip: Separate “must have” from “nice to have” deliverables so the team knows where to focus if time runs short."
          - generic [ref=e55]:
            - heading "4. Tone" [level=3] [ref=e56]
            - paragraph [ref=e57]: "How should this work feel? Tone is not just about language — it encompasses visual register, emotional temperature, and brand personality. Define it by choosing three adjectives, then sharpen each one: not just “warm” but “the warmth of a trusted older sibling, not a greeting card.”"
            - paragraph [ref=e58]: "Tip: “Tone reference” examples (brands, films, publications you admire) communicate faster than any adjective list."
          - generic [ref=e59]:
            - heading "5. Budget" [level=3] [ref=e60]
            - paragraph [ref=e61]: What is the production budget? Creatives need to know what world they are playing in. A great idea that costs five times the budget is not a great idea for this brief — it is a waste of everyone's time. Sharing the budget does not weaken your negotiating position; it gives the team the constraint they need to be resourceful.
            - paragraph [ref=e62]: "Tip: If budget is genuinely confidential, provide a range or a proxy: “this should feel like a £200k shoot, not a £20k one.”"
          - generic [ref=e63]:
            - heading "6. Timeline" [level=3] [ref=e64]
            - paragraph [ref=e65]: "When does the work go live, and what are the key milestones between now and then? Include: brief sign-off date, concept presentation, client feedback rounds, legal approval, production start, and final delivery. A timeline without these waypoints is just a deadline."
            - paragraph [ref=e66]: "Tip: Work backwards from the live date. If the timeline is impossible, say so now — not three weeks in."
          - generic [ref=e67]:
            - heading "7. KPIs" [level=3] [ref=e68]
            - paragraph [ref=e69]: How will you know if the work succeeded? Define the metrics upfront. These might be brand tracking scores, click-through rates, share of voice, sales uplift, or qualitative research. Whatever they are, agree them before the work starts — not after, when everyone is post-rationalising.
            - paragraph [ref=e70]: "Tip: KPIs reveal what the client really cares about. If they cannot name their KPIs, the brief is not ready."
          - generic [ref=e71]:
            - heading "8. Brand Context" [level=3] [ref=e72]
            - paragraph [ref=e73]: "What does the creative team need to know about the brand to do this job? This includes: brand positioning, visual identity guidelines, tone of voice principles, key mandatories (logo usage, legal disclaimers), and — critically — what the brand has done before so the team can build on or deliberately depart from it."
            - paragraph [ref=e74]: "Tip: Include “mandatories” (things that must appear) and “no-go zones” (things that are off-limits). Both save time."

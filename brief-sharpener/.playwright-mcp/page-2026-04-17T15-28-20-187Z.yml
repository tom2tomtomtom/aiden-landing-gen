        - generic [ref=e22]:
          - heading "1. What Makes a Great Brief" [level=2] [ref=e23]
          - generic [ref=e24]:
            - paragraph [ref=e25]: A great brief is not a long one. It is a sharp one. The purpose of a creative brief is not to document everything you know — it is to isolate the single most important thing a piece of work needs to do, and give the creative team everything they need to do it well.
            - paragraph [ref=e26]:
              - text: "Great briefs share three qualities:"
              - strong [ref=e27]: clarity
              - text: (everyone reading it arrives at the same understanding),
              - strong [ref=e28]: constraint
              - text: (it closes off wrong directions so creative energy flows in the right ones), and
              - strong [ref=e29]: tension
              - text: (it presents a problem worth solving, not just a task to execute).
            - paragraph [ref=e30]: Think of the brief as a contract between strategy and creativity. Strategy commits to defining the problem clearly. Creativity commits to solving it. When the contract is fuzzy, both sides lose.
            - heading "The brief vs. the briefing" [level=3] [ref=e31]
            - paragraph [ref=e32]: The brief is a document. The briefing is a conversation. Both matter. Many teams write a strong brief but skip the briefing — the live session where creative teams can ask questions, push back, and internalise the challenge. Always do both.
            - heading "Who writes the brief?" [level=3] [ref=e33]
            - paragraph [ref=e34]: The brief is typically written by a strategist or account lead, in collaboration with the client. The client often has strong opinions about what they want to say; the strategist's job is to translate that into what the audience needs to hear. These are often very different things.
